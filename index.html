<style>
/* Base Reset */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: #000; /* Dark background to see the blur */
    height: 100vh;
    font-family: "Segoe UI", sans-serif;
    overflow: hidden;
}

/* Taskbar Base */
.taskbar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 48px;
    background: rgba(32, 32, 32, 0.88);
    backdrop-filter: blur(18px);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    z-index: 9999;
}

.taskbar-center {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-self: center;
}

/* Icons and Active Indicators */
.icon {
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: 0.15s;
    cursor: pointer;
    position: relative;
}

.icon:hover {
    background: rgba(255, 255, 255, 0.12);
}

.icon:active {
    transform: scale(0.85);
}

.icon img,
.icon svg {
    width: 24px;
    height: 24px;
}

/* Windows 11 Open App Indicator Pill */
.icon.active::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 3px;
    background-color: #8bb4f7;
    border-radius: 2px;
    transition: width 0.2s ease;
}

/* System Tray */
.taskbar-right {
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-right: 12px;
    color: #fff;
}

.tray {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0.9;
    border-radius: 4px;
}

.tray:hover {
    background: rgba(255, 255, 255, 0.12);
}

.clock {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    line-height: 1.15;
    font-size: 12px;
    min-width: 74px;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
}

.clock:hover {
    background: rgba(255, 255, 255, 0.12);
}

.clock div {
    white-space: nowrap;
}

/* --- INTERACTIVE FLYOUT MENUS --- */

.flyout {
    position: absolute;
    bottom: 60px;
    background: rgba(32, 32, 32, 0.95);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: white;
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 9998;
}

.flyout.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

/* Start Menu Specifics */
#start-menu {
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    width: 600px;
    height: 500px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

#start-menu.show {
    transform: translateX(-50%) translateY(0);
}

.start-search {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px 16px;
    border-radius: 20px;
    color: white;
    font-size: 14px;
}

.pinned-apps {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 15px;
    text-align: center;
}

.pinned-app {
    padding: 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}
.pinned-app:hover { background: rgba(255,255,255,0.1); }
.pinned-app img { width: 32px; height: 32px; margin-bottom: 8px; }

/* Calendar Specifics */
#calendar-menu {
    right: 12px;
    width: 320px;
    height: 350px;
    padding: 20px;
}

.cal-header {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
}
</style>

<div id="start-menu" class="flyout">
    <div class="start-search">Type here to search</div>
    <div style="font-weight: 600; font-size: 14px; margin-top: 10px;">Pinned</div>
    <div class="pinned-apps">
        <div class="pinned-app">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Google_Chrome_icon_%28February_2022%29.svg"><br>Chrome
        </div>
        <div class="pinned-app">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg"><br>Drive
        </div>
    </div>
</div>

<div id="calendar-menu" class="flyout">
    <div class="cal-header">
        <div id="flyout-date" style="font-size: 18px; margin-bottom: 4px;"></div>
        <div style="opacity: 0.7; font-weight: normal;">No new notifications</div>
    </div>
    <div style="text-align: center; opacity: 0.5; margin-top: 40px; font-size: 13px;">
        Interactive Calendar Space
    </div>
</div>


<div class="taskbar">
    <div></div>

    <div class="taskbar-center">
        <div class="icon start-btn" id="btn-start" title="Start">
            <svg viewBox="0 0 23 23">
                <path fill="#00ADEF" d="M0 0h11.1v11.1H0zM11.9 0H23v11.1H11.9zM0 11.9h11.1V23H0zM11.9 11.9H23V23H11.9z"/>
            </svg>
        </div>

        <div class="icon app-btn" title="Explorer">
            <svg viewBox="0 0 24 24">
                <path fill="#FFD54F" d="M20 6h-8l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z"/>
                <path fill="#F9A825" d="M4 6h6l2 2h8V6z"/>
            </svg>
        </div>

        <div class="icon app-btn active" title="Chrome">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Google_Chrome_icon_%28February_2022%29.svg">
        </div>

        <div class="icon app-btn" title="Drive">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg">
        </div>

        <div class="icon app-btn" title="Settings">
            <svg viewBox="0 0 24 24">
                <path fill="#d0d0d0" d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58-.12-.64-1.92-3.32-.6-.22-2.39.96a7.8 7.8 0 0 0-1.63-.94L14.4 2.8l-.49-.42h-3.82l-.49.42-.36 2.52a7.7 7.7 0 0 0-1.62.94l-2.4-.96-.59.22L2.7 8.84l.12.64 2.03 1.58a7.2 7.2 0 0 0 0 1.88L2.82 14.5l-.12.64 1.92 3.32.59.22 2.4-.96c.49.38 1.03.7 1.62.94l.36 2.52.49.42h3.82l.49-.42.36-2.52c.6-.24 1.14-.56 1.63-.94l2.39.96.6-.22 1.92-3.32-.12-.64-2.03-1.58c.04-.3.06-.61.06-.94zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
            </svg>
        </div>
    </div>

    <div class="taskbar-right">
        <div class="tray">▲</div>
        <div class="tray">🎤</div>
        <div class="tray">📶</div>
        <div class="tray">🔊</div>

        <div class="clock" id="btn-clock">
            <div id="clockTime"></div>
            <div id="clockDate"></div>
        </div>
    </div>
</div>

<script>
// --- CLOCK LOGIC ---
function updateClock(){
    const now = new Date();
    
    // Update Taskbar
    document.getElementById("clockTime").textContent = now.toLocaleTimeString("en-US",{ hour:"numeric", minute:"2-digit", hour12:true });
    document.getElementById("clockDate").textContent = now.toLocaleDateString("en-US",{ month:"numeric", day:"numeric", year:"numeric" });
    
    // Update Calendar Flyout Header
    document.getElementById("flyout-date").textContent = now.toLocaleDateString("en-US",{ weekday:"long", month:"long", day:"numeric" });
}

updateClock();
setInterval(updateClock, 1000);

// --- INTERACTIVE UI LOGIC ---
const startBtn = document.getElementById("btn-start");
const startMenu = document.getElementById("start-menu");

const clockBtn = document.getElementById("btn-clock");
const calendarMenu = document.getElementById("calendar-menu");

const appBtns = document.querySelectorAll(".app-btn");

// Toggle Start Menu
startBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    calendarMenu.classList.remove("show"); // Close calendar if open
    startMenu.classList.toggle("show");
});

// Toggle Calendar Menu
clockBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    startMenu.classList.remove("show"); // Close start if open
    calendarMenu.classList.toggle("show");
});

// Toggle Active states on App Icons
appBtns.forEach(btn => {
    btn.addEventListener("click", (e) => {
        e.stopPropagation();
        btn.classList.toggle("active");
    });
});

// Close all menus when clicking anywhere else on the screen
document.addEventListener("click", (e) => {
    if (!startMenu.contains(e.target) && !calendarMenu.contains(e.target)) {
        startMenu.classList.remove("show");
        calendarMenu.classList.remove("show");
    }
});

// Prevent menu clicks from closing themselves
startMenu.addEventListener("click", (e) => e.stopPropagation());
calendarMenu.addEventListener("click", (e) => e.stopPropagation());
</script>
