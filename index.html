<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Windows 11 Simulator</title>
    <style>
        /* Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=1920') center/cover; 
            height: 100vh;
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
        }

        /* --- INTERACTIVE PROMPT BOX --- */
        #ask-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            background: #f75c00;
            padding: 20px;
            border-radius: 8px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 5000;
        }
        .ask-input-group { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 8px; border: none; border-radius: 4px; }
        button { padding: 8px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }

        /* --- TASKBAR & WINDOW STYLES (Kept from previous) --- */
        .taskbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background: rgba(32, 32, 32, 0.88); backdrop-filter: blur(18px); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.08); z-index: 9999; }
        .taskbar-center { display: flex; align-items: center; gap: 6px; justify-self: center; }
        .icon { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; position: relative; }
        .icon:hover { background: rgba(255, 255, 255, 0.12); }
        .icon.active::after { content: ''; position: absolute; bottom: 2px; width: 16px; height: 3px; background-color: #8bb4f7; border-radius: 2px; }

        /* Window Styles */
        #window-explorer { position: absolute; top: 15%; left: 20%; width: 800px; height: 500px; background: #202020; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; display: none; flex-direction: column; color: white; z-index: 9000; }
        #window-explorer.open { display: flex; }
        .window-header { display: flex; justify-content: space-between; padding: 0 15px; height: 40px; align-items: center; cursor: move; }
        .window-body { display: flex; flex: 1; background: #191919; }
        .sidebar { width: 200px; padding: 10px; font-size: 13px; }
        .sidebar-item { padding: 8px; cursor: pointer; border-radius: 4px; }
        .sidebar-item.active { background: rgba(255,255,255,0.12); }
        .main-content { flex: 1; padding: 20px; }
        .file-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .file-item { text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="ask-prompt">
    <p>Ask a question to see where to click:</p>
    <div class="ask-input-group">
        <input type="text" placeholder="e.g., Where do I see files or pictures?">
        <button>Ask</button>
    </div>
</div>

<div id="window-explorer">
    <div class="window-header" id="explorer-header">
        <div>Home</div>
        <div id="btn-close-explorer" style="cursor:pointer">✕</div>
    </div>
    <div class="window-body">
        <div class="sidebar">
            <div class="sidebar-item active" data-folder="Home">🏠 Home</div>
            <div class="sidebar-item" data-folder="Pictures">🖼️ Pictures</div>
        </div>
        <div class="main-content">
            <div id="breadcrumb">Home</div>
            <div class="file-grid" id="file-grid"></div>
        </div>
    </div>
</div>

<div class="taskbar">
    <div></div>
    <div class="taskbar-center">
        <div class="icon" id="btn-taskbar-explorer"><svg width="24" height="24" viewBox="0 0 24 24"><path fill="#FFD54F" d="M20 6h-8l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z"/></svg></div>
    </div>
    <div></div>
</div>

<script>
    // Explorer Logic
    const explorer = document.getElementById("window-explorer");
    const taskbarBtn = document.getElementById("btn-taskbar-explorer");
    
    taskbarBtn.addEventListener("click", () => {
        explorer.classList.toggle("open");
        taskbarBtn.classList.toggle("active");
    });

    document.getElementById("btn-close-explorer").addEventListener("click", () => {
        explorer.classList.remove("open");
        taskbarBtn.classList.remove("active");
    });

    // File System Data
    const fileSystem = {
        Home: [{name: "Projects"}, {name: "Taxes"}],
        Pictures: [{name: "vacation.jpg"}, {name: "dog.png"}]
    };

    function openFolder(folder) {
        const grid = document.getElementById("file-grid");
        grid.innerHTML = "";
        fileSystem[folder].forEach(item => {
            grid.innerHTML += `<div class="file-item">📁 ${item.name}</div>`;
        });
    }

    // Initialize
    openFolder("Home");
</script>
</body>
</html>
