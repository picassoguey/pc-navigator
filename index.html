<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Windows 11 Simulator - Fixed Icons</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        #desktop {
            width: 100%;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=1920'); 
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Draggable Orange Prompt Box */
        #prompt-window {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 580px;
            background-color: #ff5500; 
            border: 1px solid #000;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border-radius: 8px;
            cursor: move;
            z-index: 100;
        }

        #prompt-window label {
            display: block;
            color: #000;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #question-input {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(0,0,0,0.3);
            border-radius: 4px;
            font-size: 15px;
            outline: none;
        }

        #ask-btn {
            background-color: #d44500;
            color: white;
            border: none;
            padding: 0 25px;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #ask-btn:hover {
            background-color: #b33a00;
        }

        .suggestions {
            margin-top: 10px;
            font-size: 11px;
            color: #111;
            line-height: 1.4;
        }

        /* Taskbar Configuration */
        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background-color: rgba(28, 28, 28, 0.75); 
            backdrop-filter: blur(20px) saturate(125%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            z-index: 50;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .taskbar-left {
            display: flex;
            align-items: center;
            color: #ffffff;
            font-size: 12px;
            width: 150px;
        }
        .weather-icon {
            font-size: 18px;
            margin-right: 6px;
        }

        .taskbar-center {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* Universal Icon Styling */
        .icon {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .icon:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }
        
        .icon:active {
            transform: scale(0.90);
        }

        .icon svg, .icon img {
            width: 24px;
            height: 24px;
        }

        .taskbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffffff;
            font-size: 12px;
            width: 150px;
            justify-content: flex-end;
        }

        .system-indicators {
            display: flex;
            gap: 8px;
            opacity: 0.9;
        }

        .time-date-block {
            line-height: 1.2;
            text-align: right;
        }

        /* Guidance Overlays */
        #guidance-arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 32px solid #ff5500;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.6));
            display: none;
            z-index: 99;
            pointer-events: none;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-12px); }
        }

        #faq-bubble {
            position: absolute;
            background: #ffffff;
            color: #111111;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 101;
            font-size: 13px;
            max-width: 320px;
            border-left: 5px solid #ff5500;
        }

        #faq-bubble h4 {
            margin-bottom: 6px;
            color: #0078d4;
            font-size: 14px;
        }
        
        #faq-bubble ol {
            margin-left: 15px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="desktop">

    <!-- Draggable Prompt Window -->
    <div id="prompt-window">
        <label>Ask a question to see where to click:</label>
        <div class="input-group">
            <input type="text" id="question-input" placeholder="e.g., Where do I see files or pictures?" autocomplete="off">
            <button id="ask-btn">Ask</button>
        </div>
        <div class="suggestions">
            <strong>Try asking:</strong> "how to browse google" • "where are my folders" • "how to use cloud storage" • "open start menu" • "open settings"
        </div>
    </div>

    <div id="guidance-arrow"></div>
    <div id="faq-bubble"></div>

    <!-- Realigned Windows 11 Taskbar Frame -->
    <div id="taskbar">
        
        <!-- Left Zone: Weather -->
        <div class="taskbar-left">
            <span class="weather-icon">⛅</span>
            <div>
                <div>70°F</div>
                <div style="font-size: 10px; opacity: 0.7;">Windy</div>
            </div>
        </div>

        <!-- Center Zone: Fully Hardcoded SVG App Icons -->
        <div class="taskbar-center">
            
            <!-- 1. Start Button (Windows 11 Inline SVG) -->
            <div class="icon" id="target-start" title="Start Menu">
                <svg viewBox="0 0 23 23" fill="#00adef">
                    <path d="M0 0h11.1v11.1H0zM11.9 0H23v11.1H11.9zM0 11.9h11.1V23H0zM11.9 11.9H23V23H11.9z"/>
                </svg>
            </div>

            <!-- 2. File Explorer (Custom Inline SVG Folder) -->
            <div class="icon" id="target-explorer" title="File Explorer">
                <svg viewBox="0 0 24 24">
                    <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z" fill="#ffca28"/>
                    <path d="M4 6h6l2 2h8V6H4z" fill="#ffa000"/>
                </svg>
            </div>

            <!-- 3. Google Chrome -->
            <div class="icon" id="target-chrome" title="Google Chrome Browser">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Google_Chrome_icon_%28February_2022%29.svg" alt="Chrome">
            </div>

            <!-- 4. Google Drive -->
            <div class="icon" id="target-drive" title="Google Drive">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Drive">
            </div>

            <!-- 5. Settings (Custom Inline SVG Gear) -->
            <div class="icon" id="target-settings" title="System Settings">
                <svg viewBox="0 0 24 24" fill="#cccccc">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </div>
        </div>

        <!-- Right Zone: System Status -->
        <div class="taskbar-right">
            <div class="system-indicators">
                <span>🌐</span>
                <span>🔊</span>
                <span>🔋</span>
            </div>
            <div class="time-date-block">
                <div id="win-time">4:55 PM</div>
                <div id="win-date" style="font-size: 11px; opacity: 0.8;">6/25/2026</div>
            </div>
        </div>

    </div>

</div>

<script>
    // Drag Logic
    const promptWindow = document.getElementById('prompt-window');
    let isDragging = false;
    let offsetX, offsetY;

    promptWindow.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
        isDragging = true;
        offsetX = e.clientX - promptWindow.getBoundingClientRect().left;
        offsetY = e.clientY - promptWindow.getBoundingClientRect().top;
        promptWindow.style.transform = 'none';
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        promptWindow.style.left = `${e.clientX - offsetX}px`;
        promptWindow.style.top = `${e.clientY - offsetY}px`;
        promptWindow.style.bottom = 'auto';
    });

    document.addEventListener('mouseup', () => { isDragging = false; });

    // FAQ Engine Array Mapping
    const faqDatabase = [
        {
            keywords: ['google', 'internet', 'website', 'chrome', 'go online', 'browser'],
            targetId: 'target-chrome',
            title: 'Google Chrome FAQ: Browsing the Web',
            steps: [
                'Click the round **Google Chrome** icon in the center of the taskbar.',
                'Type a website address (like *google.com*) in the white address bar at the top.',
                'Press the **Enter** key on your keyboard to load the webpage.'
            ]
        },
        {
            keywords: ['drive', 'cloud', 'backup', 'save file online', 'google drive'],
            targetId: 'target-drive',
            title: 'Google Drive FAQ: Cloud Sync',
            steps: [
                'Click the **Google Drive** triangular icon grouped in the center.',
                'Click the **"+" New** button inside your window view.',
                'Select **File upload** to save your desktop content safely to the internet cloud.'
            ]
        },
        {
            keywords: ['picture', 'file', 'folder', 'explorer', 'my documents', 'download'],
            targetId: 'target-explorer',
            title: 'Microsoft FAQ: Finding Your Files',
            steps: [
                'Click the yellow **File Explorer** folder icon.',
                'Look at the left-side panel list.',
                'Click on **Pictures** or **Documents** to see all of your saved files.'
            ]
        },
        {
            keywords: ['start', 'menu', 'turn off', 'shut down', 'restart', 'programs'],
            targetId: 'target-start',
            title: 'Microsoft FAQ: Windows Start Menu',
            steps: [
                'Click the blue **Windows Logo** button (the very first icon in the center group).',
                'Look through the programs list, or search for what you need.',
                'Click the circular **Power icon** in the bottom-right corner of that menu to turn off the computer.'
            ]
        },
        {
            keywords: ['settings', 'control panel', 'setup', 'wifi', 'mouse', 'background'],
            targetId: 'target-settings',
            title: 'Microsoft FAQ: System Settings',
            steps: [
                'Click the grey **Gear Icon** (Settings) in the center group.',
                'Select a category from the choices like **Network & Internet** or **Bluetooth & Devices**.',
                'Adjust options easily here to change background images or update settings.'
            ]
        }
    ];

    const askBtn = document.getElementById('ask-btn');
    const questionInput = document.getElementById('question-input');
    const arrow = document.getElementById('guidance-arrow');
    const faqBubble = document.getElementById('faq-bubble');

    function runSearchSimulation() {
        const query = questionInput.value.toLowerCase().trim();
        
        arrow.style.display = 'none';
        faqBubble.style.display = 'none';

        if (!query) return;

        let matchedFaq = faqDatabase.find(item => 
            item.keywords.some(keyword => query.includes(keyword))
        );

        if (matchedFaq) {
            const targetElement = document.getElementById(matchedFaq.targetId);
            const rect = targetElement.getBoundingClientRect();
            
            arrow.style.left = `${rect.left + (rect.width / 2) - 16}px`;
            arrow.style.top = `${rect.top - 42}px`;
            arrow.style.display = 'block';

            let stepsHtml = `<ol>`;
            matchedFaq.steps.forEach(step => {
                let cleanStep = step.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>');
                stepsHtml += `<li>${cleanStep}</li>`;
            });
            stepsHtml += `</ol>`;

            faqBubble.innerHTML = `<h4>${matchedFaq.title}</h4>${stepsHtml}`;
            faqBubble.style.left = `${Math.max(10, rect.left - 130)}px`;
            faqBubble.style.top = `${rect.top - 185}px`;
            faqBubble.style.display = 'block';
        } else {
            alert("No matching FAQ found. Try typing terms like 'google', 'pictures', 'drive', or 'turn off'.");
        }
    }

    askBtn.addEventListener('click', runSearchSimulation);
    questionInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') runSearchSimulation();
    });

    // Simulated Clock
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        
        document.getElementById('win-time').textContent = `${hours}:${minutes} ${ampm}`;
        document.getElementById('win-date').textContent = `${now.getMonth() + 1}/${now.getDate()}/${now.getFullYear()}`;
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
