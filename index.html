<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Windows 11 Simulator</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=1920') center/cover; 
            height: 100vh;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* --- TASKBAR STYLES --- */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: rgba(32, 32, 32, 0.88);
            backdrop-filter: blur(18px);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 9999;
        }

        .taskbar-center {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-self: center;
        }

        .icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: 0.15s;
            cursor: pointer;
            position: relative;
        }

        .icon:hover { background: rgba(255, 255, 255, 0.12); }
        .icon:active { transform: scale(0.85); }
        .icon img, .icon svg { width: 24px; height: 24px; }

        /* Windows 11 Open App Indicator Pill */
        .icon.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background-color: #8bb4f7;
            border-radius: 2px;
            transition: width 0.2s ease;
        }

        .taskbar-right {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 12px;
            color: #fff;
        }

        .tray {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0.9;
            border-radius: 4px;
        }
        .tray:hover { background: rgba(255, 255, 255, 0.12); }

        .clock {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            line-height: 1.15;
            font-size: 12px;
            min-width: 74px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
        }
        .clock:hover { background: rgba(255, 255, 255, 0.12); }
        .clock div { white-space: nowrap; }

        /* --- FLYOUT MENUS (Start & Calendar) --- */
        .flyout {
            position: absolute;
            bottom: 60px;
            background: rgba(32, 32, 32, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9998;
        }

        .flyout.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        #start-menu {
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            width: 600px;
            height: 500px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #start-menu.show { transform: translateX(-50%) translateY(0); }

        .start-search {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }

        #calendar-menu { right: 12px; width: 320px; height: 350px; padding: 20px; }
        .cal-header { font-size: 14px; font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        /* --- FILE EXPLORER WINDOW APP --- */
        #window-explorer {
            position: absolute;
            top: 15%;
            left: 20%;
            width: 800px;
            height: 500px;
            background: #202020;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            color: white;
            z-index: 9000;
            overflow: hidden;
            display: none; /* Hidden by default */
        }

        #window-explorer.open {
            display: flex;
        }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0 0 15px;
            height: 40px;
            background: transparent;
            cursor: move; /* Indicates it can be dragged */
        }

        .window-title {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-controls {
            display: flex;
            height: 100%;
        }

        .win-btn {
            width: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .win-btn:hover { background: rgba(255,255,255,0.1); }
        .win-btn.close:hover { background: #e81123; }

        .window-body {
            display: flex;
            flex: 1;
            background: #191919;
        }

        .sidebar {
            width: 200px;
            background: #202020;
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 10px;
            font-size: 13px;
        }
        
        .sidebar-item {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.08); }
        .sidebar-item.active { background: rgba(255,255,255,0.12); }

        .main-content {
            flex: 1;
            padding: 20px;
        }

        .breadcrumb {
            font-size: 14px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
        }

        .file-item {
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .file-item:hover { background: rgba(255,255,255,0.08); }
        .file-item svg { width: 48px; height: 48px; margin-bottom: 8px; }

    </style>
</head>
<body>

                <path fill="#FFD54F" d="M20 6h-8l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z"/>
                <path fill="#F9A825" d="M4 6h6l2 2h8V6z"/>
            </svg>
            Home

            <div class="win-btn">□</div>
            <div class="win-btn close" id="btn-close-explorer">✕</div>
        </div>
    </div>
    
    <div class="window-body">
        <div class="sidebar">
            <div class="sidebar-item active">🏠 Home</div>
            <div class="sidebar-item">🖼️ Pictures</div>

            <div class="sidebar-item">⬇️ Downloads</div>
            <div class="sidebar-item">🎵 Music</div>
            <div class="sidebar-item" style="margin-top:20px;">💻 This PC</div>
            <div class="sidebar-item">☁️ Network</div>
        </div>

            <div class="breadcrumb">Home > Quick Access</div>

                    <div>
