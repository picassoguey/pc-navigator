<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Windows 11 Simulator</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=1920') center/cover; 
            height: 100vh;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* --- TASKBAR STYLES --- */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: rgba(32, 32, 32, 0.88);
            backdrop-filter: blur(18px);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 9999;
        }

        .taskbar-center {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-self: center;
        }

        .icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: 0.15s;
            cursor: pointer;
            position: relative;
        }

        .icon:hover { background: rgba(255, 255, 255, 0.12); }
        .icon:active { transform: scale(0.85); }
        .icon img, .icon svg { width: 24px; height: 24px; }

        .icon.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background-color: #8bb4f7;
            border-radius: 2px;
            transition: width 0.2s ease;
        }

        .taskbar-right {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 12px;
            color: #fff;
        }

        .tray {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0.9;
            border-radius: 4px;
        }
        .tray:hover { background: rgba(255, 255, 255, 0.12); }

        .clock {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            line-height: 1.15;
            font-size: 12px;
            min-width: 74px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
        }
        .clock:hover { background: rgba(255, 255, 255, 0.12); }
        .clock div { white-space: nowrap; }

        /* --- FLYOUT MENUS (Start & Calendar) --- */
        .flyout {
            position: absolute;
            bottom: 60px;
            background: rgba(32, 32, 32, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9998;
        }

        .flyout.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        #start-menu {
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            width: 600px;
            height: 500px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #start-menu.show { transform: translateX(-50%) translateY(0); }

        .start-search {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }

        #calendar-menu { right: 12px; width: 320px; height: 350px; padding: 20px; }
        .cal-header { font-size: 14px; font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        /* --- FILE EXPLORER WINDOW APP --- */
        #window-explorer {
            position: absolute;
            top: 15%;
            left: 20%;
            width: 800px;
            height: 500px;
            background: #202020;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            color: white;
            z-index: 9000;
            overflow: hidden;
            display: none;
        }

        #window-explorer.open { display: flex; }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0 0 15px;
            height: 40px;
            background: transparent;
            cursor: move;
        }

        .window-title {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-controls {
            display: flex;
            height: 100%;
        }

        .win-btn {
            width: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .win-btn:hover { background: rgba(255,255,255,0.1); }
        .win-btn.close:hover { background: #e81123; }

        .window-body {
            display: flex;
            flex: 1;
            background: #191919;
        }

        .sidebar {
            width: 200px;
            background: #202020;
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 10px;
            font-size: 13px;
        }
        
        .sidebar-item {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.08); }
        .sidebar-item.active { background: rgba(255,255,255,0.12); }

        .main-content {
            flex: 1;
            padding: 20px;
        }

        .breadcrumb {
            font-size: 14px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
        }

        .file-item {
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .file-item:hover { background: rgba(255,255,255,0.08); }
        .file-item svg { width: 48px; height: 48px; margin-bottom: 8px; }

    </style>
</head>
<body>

<div id="window-explorer">
    <div class="window-header" id="explorer-header">
        <div class="window-title">
            <svg width="16" height="16" viewBox="0 0 24 24">
                <path fill="#FFD54F" d="M20 6h-8l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z"/>
                <path fill="#F9A825" d="M4 6h6l2 2h8V6z"/>
            </svg>
            Home
        </div>
        <div class="window-controls">
            <div class="win-btn">─</div>
            <div class="win-btn">□</div>
            <div class="win-btn close" id="btn-close-explorer">✕</div>
        </div>
    </div>
    
    <div class="window-body">
        <div class="sidebar">
            <div class="sidebar-item active" data-folder="Home">🏠 Home</div>
            <div class="sidebar-item" data-folder="Pictures">🖼️ Pictures</div>
            <div class="sidebar-item" data-folder="Documents">📄 Documents</div>
            <div class="sidebar-item" data-folder="Downloads">⬇️ Downloads</div>
            <div class="sidebar-item" data-folder="Music">🎵 Music</div>
        </div>
        <div class="main-content">
            <div class="breadcrumb" id="breadcrumb">
                Home
            </div>
            <div class="file-grid" id="file-grid"></div>
        </div>
    </div>
</div>

<div id="start-menu" class="flyout">
    <div class="start-search">Type here to search</div>
    <div style="font-weight: 600; font-size: 14px; margin-top: 10px;">Pinned</div>
</div>

<div id="calendar-menu" class="flyout">
    <div class="cal-header">
        <div id="flyout-date" style="font-size: 18px; margin-bottom: 4px;"></div>
        <div style="opacity: 0.7; font-weight: normal;">No new notifications</div>
    </div>
</div>

<div class="taskbar">
    <div></div>

    <div class="taskbar-center">
        <div class="icon start-btn" id="btn-start" title="Start">
            <svg viewBox="0 0 23 23">
                <path fill="#00ADEF" d="M0 0h11.1v11.1H0zM11.9 0H23v11.1H11.9zM0 11.9h11.1V23H0zM11.9 11.9H23V23H11.9z"/>
            </svg>
        </div>

        <div class="icon" id="btn-taskbar-explorer" title="Explorer">
            <svg viewBox="0 0 24 24">
                <path fill="#FFD54F" d="M20 6h-8l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z"/>
                <path fill="#F9A825" d="M4 6h6l2 2h8V6z"/>
            </svg>
        </div>

        <div class="icon" title="Settings">
            <svg viewBox="0 0 24 24">
                <path fill="#d0d0d0" d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58-.12-.64-1.92-3.32-.6-.22-2.39.96a7.8 7.8 0 0 0-1.63-.94L14.4 2.8l-.49-.42h-3.82l-.49.42-.36 2.52a7.7 7.7 0 0 0-1.62.94l-2.4-.96-.59.22L2.7 8.84l.12.64 2.03 1.58a7.2 7.2 0 0 0 0 1.88L2.82 14.5l-.12.64 1.92 3.32.59.22 2.4-.96c.49.38 1.03.7 1.62.94l.36 2.52.49.42h3.82l.49-.42.36-2.52c.6-.24 1.14-.56 1.63-.94l2.39.96.6-.22 1.92-3.32-.12-.64-2.03-1.58c.04-.3.06-.61.06-.94zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
            </svg>
        </div>
    </div>

    <div class="taskbar-right">
        <div class="tray">▲</div>
        <div class="tray">📶</div>
        <div class="tray">🔊</div>
        <div class="clock" id="btn-clock">
            <div id="clockTime"></div>
            <div id="clockDate"></div>
        </div>
    </div>
</div>

<script>
// --- CLOCK LOGIC ---
function updateClock(){
    const now = new Date();
    document.getElementById("clockTime").textContent = now.toLocaleTimeString("en-US",{ hour:"numeric", minute:"2-digit", hour12:true });
    document.getElementById("clockDate").textContent = now.toLocaleDateString("en-US",{ month:"numeric", day:"numeric", year:"numeric" });
    document.getElementById("flyout-date").textContent = now.toLocaleDateString("en-US",{ weekday:"long", month:"long", day:"numeric" });
}
updateClock();
setInterval(updateClock, 1000);

// --- MENU TOGGLES ---
const startBtn = document.getElementById("btn-start");
const startMenu = document.getElementById("start-menu");
const clockBtn = document.getElementById("btn-clock");
const calendarMenu = document.getElementById("calendar-menu");

startBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    calendarMenu.classList.remove("show");
    startMenu.classList.toggle("show");
});

clockBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    startMenu.classList.remove("show");
    calendarMenu.classList.toggle("show");
});

document.addEventListener("click", (e) => {
    if (!startMenu.contains(e.target) && !calendarMenu.contains(e.target)) {
        startMenu.classList.remove("show");
        calendarMenu.classList.remove("show");
    }
});

startMenu.addEventListener("click", (e) => e.stopPropagation());
calendarMenu.addEventListener("click", (e) => e.stopPropagation());

// --- EXPLORER WINDOW LOGIC ---
const taskbarExplorerBtn = document.getElementById("btn-taskbar-explorer");
const explorerWindow = document.getElementById("window-explorer");
const closeExplorerBtn = document.getElementById("btn-close-explorer");

taskbarExplorerBtn.addEventListener("click", () => {
    explorerWindow.classList.toggle("open");
    taskbarExplorerBtn.classList.toggle("active");
});

closeExplorerBtn.addEventListener("click", () => {
    explorerWindow.classList.remove("open");
    taskbarExplorerBtn.classList.remove("active");
});

// --- DRAGGABLE WINDOW LOGIC ---
const dragHeader = document.getElementById("explorer-header");
let isDragging = false, dragOffsetX, dragOffsetY;

dragHeader.addEventListener("mousedown", (e) => {
    if (e.target.classList.contains("win-btn")) return;
    isDragging = true;
    dragOffsetX = e.clientX - explorerWindow.getBoundingClientRect().left;
    dragOffsetY = e.clientY - explorerWindow.getBoundingClientRect().top;
});

document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    explorerWindow.style.left = `${e.clientX - dragOffsetX}px`;
    explorerWindow.style.top = `${e.clientY - dragOffsetY}px`;
});

document.addEventListener("mouseup", () => {
    isDragging = false;
});

// ==========================================
// --- NEW INTERACTIVE FILE SYSTEM LOGIC ----
// ==========================================

const fileSystem = {
    Home: [
        {type: "folder", name: "Projects"},
        {type: "folder", name: "Taxes"},
        {type: "file", name: "Resume.pdf"},
        {type: "file", name: "Budget.xlsx"}
    ],
    Projects: [
        {type: "file", name: "index.html"},
        {type: "file", name: "app.js"},
        {type: "file", name: "style.css"}
    ],
    Taxes: [
        {type: "file", name: "w2.pdf"},
        {type: "file", name: "1099.pdf"},
        {type: "file", name: "receipts.zip"}
    ],
    Pictures: [
        {type: "file", name: "vacation.jpg"},
        {type: "file", name: "dog.png"},
        {type: "file", name: "family.jpeg"}
    ],
    Documents: [
        {type: "file", name: "report.docx"},
        {type: "file", name: "notes.txt"}
    ],
    Downloads: [
        {type: "file", name: "installer.exe"},
        {type: "file", name: "archive.zip"}
    ],
    Music: [
        {type: "file", name: "song.mp3"},
        {type: "file", name: "album.zip"}
    ]
};

let currentFolder = "Home";

const grid = document.getElementById("file-grid");
const breadcrumb = document.getElementById("breadcrumb");

function folderIcon() {
    return `
    <svg viewBox="0 0 24 24">
        <path fill="#FFD54F" d="M20 6h-8l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z"/>
        <path fill="#F9A825" d="M4 6h6l2 2h8V6z"/>
    </svg>
    `;
}

function fileIcon() {
    return `
    <svg viewBox="0 0 24 24" fill="#4285F4">
        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
    </svg>
    `;
}

function openFolder(folder) {
    currentFolder = folder;
    breadcrumb.textContent = folder;
    grid.innerHTML = "";

    const items = fileSystem[folder] || [];

    items.forEach(item => {
        const div = document.createElement("div");
        div.className = "file-item";

        div.innerHTML = `
            ${item.type === "folder" ? folderIcon() : fileIcon()}
            <div>${item.name}</div>
        `;

        div.onclick = () => {
            if (item.type === "folder") {
                openFolder(item.name);
            } else {
                alert("Opening " + item.name);
            }
        };

        grid.appendChild(div);
    });
}

openFolder("Home");

// --- SIDEBAR NAVIGATION ---
document.querySelectorAll(".sidebar-item").forEach(item => {
    item.onclick = () => {
        document.querySelectorAll(".sidebar-item").forEach(i => i.classList.remove("active"));
        item.classList.add("active");
        openFolder(item.dataset.folder);
    };
});

</script>
</body>
</html>
