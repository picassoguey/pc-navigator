<!-- ================= WINDOWS 11 TASKBAR ================= -->

<style>
.taskbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:48px;
    background:rgba(32,32,32,.88);
    backdrop-filter:blur(18px);
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    border-top:1px solid rgba(255,255,255,.08);
    font-family:"Segoe UI",sans-serif;
    z-index:9999;
}

.taskbar-center{
    display:flex;
    align-items:center;
    gap:6px;
    justify-self:center;
}

.icon{
    width:42px;
    height:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    transition:.15s;
    cursor:pointer;
}

.icon:hover{
    background:rgba(255,255,255,.12);
}

.icon img,
.icon svg{
    width:24px;
    height:24px;
}

.taskbar-right{
    justify-self:end;
    display:flex;
    align-items:center;
    gap:10px;
    padding-right:12px;
    color:#fff;
}

.tray{
    width:18px;
    height:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:.9;
}

.clock{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    line-height:1.15;
    font-size:12px;
    min-width:74px;
}

.clock div{
    white-space:nowrap;
}
</style>

<div class="taskbar">

    <div></div>

    <div class="taskbar-center">

        <!-- START -->
        <div class="icon" title="Start">
            <svg viewBox="0 0 23 23">
                <path fill="#00ADEF"
                d="M0 0h11.1v11.1H0zM11.9 0H23v11.1H11.9zM0 11.9h11.1V23H0zM11.9 11.9H23V23H11.9z"/>
            </svg>
        </div>

        <!-- EXPLORER -->
        <div class="icon" title="Explorer">
            <svg viewBox="0 0 24 24">
                <path fill="#FFD54F"
                d="M20 6h-8l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z"/>
                <path fill="#F9A825"
                d="M4 6h6l2 2h8V6z"/>
            </svg>
        </div>

        <!-- CHROME -->
        <div class="icon" title="Chrome">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Google_Chrome_icon_%28February_2022%29.svg">
        </div>

        <!-- DRIVE -->
        <div class="icon" title="Drive">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg">
        </div>

        <!-- SETTINGS -->
        <div class="icon" title="Settings">
            <svg viewBox="0 0 24 24">
                <path fill="#d0d0d0"
                d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58-.12-.64-1.92-3.32-.6-.22-2.39.96a7.8 7.8 0 0 0-1.63-.94L14.4 2.8l-.49-.42h-3.82l-.49.42-.36 2.52a7.7 7.7 0 0 0-1.62.94l-2.4-.96-.59.22L2.7 8.84l.12.64 2.03 1.58a7.2 7.2 0 0 0 0 1.88L2.82 14.5l-.12.64 1.92 3.32.59.22 2.4-.96c.49.38 1.03.7 1.62.94l.36 2.52.49.42h3.82l.49-.42.36-2.52c.6-.24 1.14-.56 1.63-.94l2.39.96.6-.22 1.92-3.32-.12-.64-2.03-1.58c.04-.3.06-.61.06-.94zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
            </svg>
        </div>

    </div>

    <div class="taskbar-right">

        <!-- Hidden Icons -->
        <div class="tray">▲</div>

        <!-- Microphone -->
        <div class="tray">
            🎤
        </div>

        <!-- Network -->
        <div class="tray">
            📶
        </div>

        <!-- Volume -->
        <div class="tray">
            🔊
        </div>

        <div class="clock">
            <div id="clockTime"></div>
            <div id="clockDate"></div>
        </div>

    </div>

</div>

<script>
function updateClock(){

    const now=new Date();

    document.getElementById("clockTime").textContent=
        now.toLocaleTimeString("en-US",{
            hour:"numeric",
            minute:"2-digit",
            hour12:true,
            timeZone:"America/Los_Angeles"
        });

    document.getElementById("clockDate").textContent=
        now.toLocaleDateString("en-US",{
            month:"numeric",
            day:"numeric",
            year:"numeric",
            timeZone:"America/Los_Angeles"
        });

}

updateClock();
setInterval(updateClock,1000);
</script>
