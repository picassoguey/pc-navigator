<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows 11 VM Environment</title>
    <style>
        /* VM Desktop Styling */
        body { margin: 0; height: 100vh; background: url('https://wallpaperaccess.com/full/7633214.jpg') center/cover; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* The Interactive Help Prompt (The Guide) */
        #help-overlay {
            position: absolute; top: 50px; left: 50px; width: 350px; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 10000;
        }
        #help-overlay h3 { margin-bottom: 10px; color: #333; }
        .input-group { display: flex; gap: 5px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #0078d4; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

        /* Windows 11 Taskbar */
        .taskbar {
            position: fixed; bottom: 0; width: 100%; height: 50px;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center; gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.3);
        }
        .icon { width: 40px; height: 40px; background: rgba(0,0,0,0.1); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .icon:hover { background: rgba(0,0,0,0.2); }

        /* File Explorer Window */
        #explorer-win {
            position: absolute; top: 100px; left: 200px; width: 600px; height: 400px;
            background: white; border-radius: 8px; display: none; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.3); overflow: hidden;
        }
        .win-header { background: #f3f3f3; padding: 10px; display: flex; justify-content: space-between; cursor: move; }
        .win-content { padding: 20px; }
    </style>
</head>
<body>

    <div id="help-overlay">
        <h3>System Assistant</h3>
        <div class="input-group">
            <input type="text" id="help-input" placeholder="Ask how to use this VM...">
            <button onclick="provideHelp()">Ask</button>
        </div>
        <p id="help-response" style="margin-top:10px; font-size: 13px; color: #555;"></p>
    </div>

    <div id="explorer-win">
        <div class="win-header" id="drag-handle">File Explorer <span>✕</span></div>
        <div class="win-content">Welcome to the VM. Click folders to navigate.</div>
    </div>

    <div class="taskbar">
        <div class="icon" onclick="toggleExplorer()">📁</div>
        <div class="icon">🌐</div>
        <div class="icon">⚙️</div>
    </div>

    <script>
        function toggleExplorer() {
            const win = document.getElementById('explorer-win');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        function provideHelp() {
            const input = document.getElementById('help-input').value.toLowerCase();
            const res = document.getElementById('help-response');
            if (input.includes('file')) {
                res.textContent = "To open files, click the folder icon in the taskbar at the bottom.";
                document.getElementById('explorer-win').style.display = 'flex';
            } else {
                res.textContent = "Try asking 'How do I open files?'";
            }
        }
    </script>
</body>
</html>
