<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows 11 VM Environment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', -apple-system, sans-serif; overflow: hidden; user-select: none; }

        /* Desktop Icons */
        .desktop-icon { position: absolute; width: 100px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: 0.2s; border-radius: 8px; padding: 10px; }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.1); }
        .desktop-icon-label { font-size: 12px; color: white; text-align: center; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5); }
        .desktop-icon-img { font-size: 48px; }

        /* FIXED TASKBAR AREA */
        .taskbar {
            position: fixed;
            bottom: 15px; /* Floating look */
            left: 50%;
            transform: translateX(-50%);
            height: 52px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px; /* Pill shape */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 0 10px;
            z-index: 5000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .taskbar-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .taskbar-icon:hover { background: rgba(255, 255, 255, 0.2); }
        
        /* Active Indicator Dot/Line */
        .active-indicator {
            position: absolute;
            bottom: 4px;
            width: 12px;
            height: 3px;
            background: #ffffff;
            border-radius: 2px;
            opacity: 0;
            transition: 0.2s;
        }
        
        .taskbar-icon.active .active-indicator { opacity: 1; }

        .taskbar-separator { width: 1px; height: 24px; background: rgba(255, 255, 255, 0.2); margin: 0 5px; }

        /* Start Menu */
        #start-menu { position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%); width: 500px; height: 500px; background: rgba(30, 30, 45, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; display: none; flex-direction: column; z-index: 4999; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); }
        #start-menu.active { display: flex; }

        /* [Rest of the CSS unchanged, just kept the core fixed area styles above] */
        .window { position: absolute; background: white; border-radius: 8px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; overflow: hidden; z-index: 1000; }
        .window-header { background: #f0f0f0; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: move; }
        .window-content { flex: 1; overflow: auto; padding: 20px; }
        .window-btn { width: 30px; height: 30px; border: none; background: transparent; cursor: pointer; }
        .window-btn.close:hover { background: #e81123; color: white; }
    </style>
</head>
<body>

    <div class="desktop-icon" style="top: 20px; left: 20px;" ondblclick="openWindow('explorer', 'C:\\Users\\Guest', 600, 400, 50, 100)">
        <div class="desktop-icon-img">📁</div>
        <div class="desktop-icon-label">This PC</div>
    </div>

    <div id="start-menu">
        <div style="padding: 20px; color: white;">Start Menu Content...</div>
    </div>

    <div class="taskbar">
        <div class="taskbar-icon" onclick="toggleStartMenu()" title="Start">
            <span>🪟</span>
        </div>
        <div class="taskbar-separator"></div>
        <div class="taskbar-icon" id="explorer-taskbar" onclick="openWindow('explorer', 'C:\\Users\\Guest', 600, 400, 50, 100)">
            <span>📁</span>
            <div class="active-indicator"></div>
        </div>
        <div class="taskbar-icon" id="editor-taskbar" onclick="openWindow('editor', null, 500, 400, 150, 150)">
            <span>📝</span>
            <div class="active-indicator"></div>
        </div>
    </div>

    <script>
        let windows = {};
        
        function toggleStartMenu() {
            document.getElementById('start-menu').classList.toggle('active');
        }

        function openWindow(type, path, width, height, top, left) {
            const id = 'win-' + Math.random().toString(36).substr(2, 5);
            const windowEl = document.createElement('div');
            windowEl.className = 'window';
            windowEl.style.width = width + 'px';
            windowEl.style.height = height + 'px';
            windowEl.style.top = top + 'px';
            windowEl.style.left = left + 'px';
            
            windowEl.innerHTML = `
                <div class="window-header">
                    <span>${type}</span>
                    <button class="window-btn close" onclick="this.parentElement.parentElement.remove(); updateTaskbar()">✕</button>
                </div>
                <div class="window-content">Content for ${type}</div>
            `;
            
            document.body.appendChild(windowEl);
            windows[id] = { type, element: windowEl };
            
            // Mark taskbar as active
            updateTaskbar();
        }

        function updateTaskbar() {
            // Reset all
            document.querySelectorAll('.taskbar-icon').forEach(el => el.classList.remove('active'));
            
            // Check active windows and update icons
            Object.values(windows).forEach(win => {
                if (win.type === 'explorer') document.getElementById('explorer-taskbar').classList.add('active');
                if (win.type === 'editor') document.getElementById('editor-taskbar').classList.add('active');
            });
        }
    </script>
</body>
</html>
