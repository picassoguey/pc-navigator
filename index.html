<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows 11 VM Environment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Desktop Background */
        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', -apple-system, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* Desktop Icons */
        .desktop-icon {
            position: absolute;
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 8px;
            padding: 10px;
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .desktop-icon-label {
            font-size: 12px;
            color: white;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            word-break: break-word;
        }

        .desktop-icon-img {
            font-size: 48px;
        }

        /* Windows 11 Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 0 15px;
            z-index: 5000;
            margin-bottom: 10px;
        }

        .taskbar-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .taskbar-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .taskbar-icon.active {
            background: rgba(255, 255, 255, 0.3);
        }

        .taskbar-separator {
            width: 1px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 5px;
        }

        /* Start Menu */
        #start-menu {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            max-height: 600px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            z-index: 4999;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #start-menu.active {
            display: flex;
        }

        .start-search {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .start-search input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .start-search input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .start-apps {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .start-app-item {
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            color: white;
        }

        .start-app-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .start-app-icon {
            font-size: 28px;
        }

        /* Window Base Style */
        .window {
            position: absolute;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        .window.active {
            z-index: 2000;
        }

        .window-header {
            background: linear-gradient(90deg, #f0f0f0 0%, #e8e8e8 100%);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
            border-bottom: 1px solid #e0e0e0;
        }

        .window-title {
            font-weight: 500;
            font-size: 14px;
            color: #333;
            flex: 1;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 18px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .window-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .window-btn.close:hover {
            background: #e81123;
            color: white;
        }

        .window-content {
            flex: 1;
            overflow: auto;
            padding: 20px;
            background: white;
        }

        /* File Explorer */
        .explorer-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .nav-btn {
            padding: 6px 12px;
            background: #f0f0f0;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: #e8e8e8;
        }

        .address-bar {
            background: #f8f8f8;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            padding: 8px 12px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #333;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .file-item {
            padding: 10px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .file-item:hover {
            background: rgba(0, 120, 212, 0.1);
        }

        .file-item.selected {
            background: rgba(0, 120, 212, 0.2);
            border: 2px solid #0078d4;
            border-radius: 4px;
        }

        .file-icon {
            font-size: 32px;
        }

        .file-name {
            font-size: 12px;
            color: #333;
            word-break: break-word;
        }

        /* Text Editor */
        .editor-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #editor-textarea {
            flex: 1;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        .editor-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #1084d7;
        }

        /* Context Menu */
        #context-menu {
            position: fixed;
            background: white;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 9999;
            overflow: hidden;
            min-width: 200px;
        }

        .context-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 12px;
            color: #333;
            transition: 0.2s;
        }

        .context-item:hover {
            background: #f0f0f0;
        }

        .context-separator {
            height: 1px;
            background: #e0e0e0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <!-- Desktop Icons -->
    <div class="desktop-icon" style="top: 20px; left: 20px;" ondblclick="openWindow('explorer', 'C:\\Users\\Guest', 600, 400, 50, 100)">
        <div class="desktop-icon-img">📁</div>
        <div class="desktop-icon-label">This PC</div>
    </div>

    <div class="desktop-icon" style="top: 130px; left: 20px;" ondblclick="openWindow('editor', null, 500, 400, 150, 150)">
        <div class="desktop-icon-img">📝</div>
        <div class="desktop-icon-label">Notepad</div>
    </div>

    <div class="desktop-icon" style="top: 240px; left: 20px;" ondblclick="openWindow('terminal', null, 600, 400, 250, 200)">
        <div class="desktop-icon-img">⌨️</div>
        <div class="desktop-icon-label">Terminal</div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div class="start-search">
            <input type="text" id="start-search" placeholder="Type here to search" onkeyup="filterApps()">
        </div>
        <div class="start-apps" id="start-apps-list">
            <div class="start-app-item" ondblclick="openWindow('explorer', 'C:\\Users\\Guest', 600, 400, 50, 100); toggleStartMenu()">
                <div class="start-app-icon">📁</div>
                <div>File Explorer</div>
            </div>
            <div class="start-app-item" ondblclick="openWindow('editor', null, 500, 400, 150, 150); toggleStartMenu()">
                <div class="start-app-icon">📝</div>
                <div>Notepad</div>
            </div>
            <div class="start-app-item" ondblclick="openWindow('terminal', null, 600, 400, 250, 200); toggleStartMenu()">
                <div class="start-app-icon">⌨️</div>
                <div>Terminal</div>
            </div>
            <div class="start-app-item" ondblclick="openWindow('settings', null, 600, 500, 100, 100); toggleStartMenu()">
                <div class="start-app-icon">⚙️</div>
                <div>Settings</div>
            </div>
            <div class="start-app-item" ondblclick="openWindow('calculator', null, 350, 400, 200, 200); toggleStartMenu()">
                <div class="start-app-icon">🧮</div>
                <div>Calculator</div>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <div class="taskbar-icon" onclick="toggleStartMenu()" title="Start">
            <span>🪟</span>
        </div>
        <div class="taskbar-separator"></div>
        <div class="taskbar-icon" id="explorer-taskbar" onclick="openWindow('explorer', 'C:\\Users\\Guest', 600, 400, 50, 100)" title="File Explorer">
            <span>📁</span>
        </div>
        <div class="taskbar-icon" id="editor-taskbar" onclick="openWindow('editor', null, 500, 400, 150, 150)" title="Notepad">
            <span>📝</span>
        </div>
        <div class="taskbar-icon" id="terminal-taskbar" onclick="openWindow('terminal', null, 600, 400, 250, 200)" title="Terminal">
            <span>⌨️</span>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu"></div>

    <script>
        const fileSystem = {
            'C:\\Users\\Guest': {
                type: 'folder',
                icon: '📁',
                files: {
                    'Documents': {
                        type: 'folder',
                        icon: '📁',
                        files: {
                            'Resume.txt': { type: 'file', icon: '📄', content: 'My Resume\n\nExperience:\n- Software Developer\n- Web Designer' },
                            'Notes.txt': { type: 'file', icon: '📄', content: 'Important Notes:\n- Remember project deadline\n- Meeting at 3 PM' }
                        }
                    },
                    'Pictures': {
                        type: 'folder',
                        icon: '🖼️',
                        files: {
                            'Vacation.jpg': { type: 'file', icon: '🖼️' },
                            'Screenshot.png': { type: 'file', icon: '🖼️' }
                        }
                    },
                    'Downloads': {
                        type: 'folder',
                        icon: '📥',
                        files: {
                            'installer.exe': { type: 'file', icon: '💾' },
                            'readme.txt': { type: 'file', icon: '📄', content: 'Installation Instructions:\n1. Run installer\n2. Follow prompts\n3. Restart computer' }
                        }
                    },
                    'Desktop': {
                        type: 'folder',
                        icon: '🖥️',
                        files: {}
                    }
                }
            }
        };

        let windows = {};
        let windowCount = 0;
        let draggingWindow = null;
        let dragOffset = { x: 0, y: 0 };
        let currentPath = 'C:\\Users\\Guest';

        function toggleStartMenu() {
            const menu = document.getElementById('start-menu');
            menu.classList.toggle('active');
        }

        function filterApps() {
            const searchTerm = document.getElementById('start-search').value.toLowerCase();
            const items = document.querySelectorAll('.start-app-item');
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(searchTerm) ? 'flex' : 'none';
            });
        }

        function getFileAt(path) {
            const parts = path.split('\\').filter(p => p);
            let current = fileSystem;
            for (const part of parts) {
                if (current[part]) {
                    current = current[part].files || current[part];
                } else {
                    return null;
                }
            }
            return current;
        }

        function openWindow(type, path, width, height, top, left) {
            windowCount++;
            const id = `window-${type}-${windowCount}`;
            
            // Close start menu
            document.getElementById('start-menu').classList.remove('active');

            const windowEl = document.createElement('div');
            windowEl.className = 'window active';
            windowEl.id = id;
            windowEl.style.width = width + 'px';
            windowEl.style.height = height + 'px';
            windowEl.style.top = top + 'px';
            windowEl.style.left = left + 'px';

            let content = '';

            if (type === 'explorer') {
                currentPath = path;
                const files = getFileAt(path);
                const pathParts = path.split('\\');
                
                content = `
                    <div class="explorer-nav">
                        <button class="nav-btn" onclick="navigateBack()">← Back</button>
                        <button class="nav-btn" onclick="navigateUp()">⬆️ Up</button>
                    </div>
                    <div class="address-bar">${path}</div>
                    <div class="file-grid" id="file-grid">
                        ${renderFiles(files, path)}
                    </div>
                `;
            } else if (type === 'editor') {
                content = `
                    <div class="editor-content">
                        <textarea id="editor-textarea" placeholder="Type here..."></textarea>
                        <div class="editor-buttons">
                            <button class="btn" onclick="saveFile()">Save</button>
                            <button class="btn" onclick="clearEditor()">Clear</button>
                        </div>
                    </div>
                `;
            } else if (type === 'terminal') {
                content = `
                    <div class="editor-content">
                        <div style="flex: 1; background: #1a1a1a; color: #00ff00; padding: 10px; border-radius: 4px; font-family: monospace; overflow-y: auto; border: 1px solid #333;">
                            <div>Windows 11 Terminal</div>
                            <div>Version 1.0</div>
                            <div style="margin-top: 10px;">C:\\Users\\Guest> _</div>
                        </div>
                        <div class="editor-buttons">
                            <input type="text" placeholder="Enter command..." style="flex: 1; padding: 8px; border: 1px solid #d0d0d0; border-radius: 4px;" onkeypress="handleCommand(event)">
                        </div>
                    </div>
                `;
            } else if (type === 'settings') {
                content = `
                    <div style="color: #333;">
                        <h3 style="margin-bottom: 15px;">⚙️ System Settings</h3>
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <div>
                                <strong>Display</strong>
                                <p style="font-size: 12px; color: #666;">Resolution: 1920x1080</p>
                            </div>
                            <div>
                                <strong>Sound</strong>
                                <p style="font-size: 12px; color: #666;">Volume: 75%</p>
                            </div>
                            <div>
                                <strong>About</strong>
                                <p style="font-size: 12px; color: #666;">Windows 11 VM Environment v1.0</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (type === 'calculator') {
                content = `
                    <div class="editor-content" style="align-items: stretch;">
                        <input type="text" id="calc-display" readonly style="padding: 12px; font-size: 18px; border: 1px solid #d0d0d0; border-radius: 4px; text-align: right; margin-bottom: 10px;">
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex: 1;">
                            ${['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+'].map(btn => 
                                `<button class="btn" style="flex: 1; padding: 20px;" onclick="calcButton('${btn}')">${btn}</button>`
                            ).join('')}
                        </div>
                    </div>
                `;
            }

            windowEl.innerHTML = `
                <div class="window-header" onmousedown="startDrag(event, '${id}')">
                    <div class="window-title">${getWindowTitle(type)}</div>
                    <div class="window-controls">
                        <button class="window-btn" onclick="minimizeWindow('${id}')">🗕</button>
                        <button class="window-btn" onclick="maximizeWindow('${id}')">🗖</button>
                        <button class="window-btn close" onclick="closeWindow('${id}')">✕</button>
                    </div>
                </div>
                <div class="window-content" oncontextmenu="showContextMenu(event, '${type}')">${content}</div>
            `;

            document.body.appendChild(windowEl);
            windows[id] = { type, element: windowEl, minimized: false };
            updateTaskbar(type);
        }

        function getWindowTitle(type) {
            const titles = {
                'explorer': '📁 File Explorer',
                'editor': '📝 Notepad',
                'terminal': '⌨️ Terminal',
                'settings': '⚙️ Settings',
                'calculator': '🧮 Calculator'
            };
            return titles[type] || 'Window';
        }

        function renderFiles(files, path) {
            if (!files) return '';
            return Object.entries(files).map(([name, item]) => {
                const itemPath = path + '\\' + name;
                return `
                    <div class="file-item" ondblclick="openFile('${itemPath}', '${item.type}')">
                        <div class="file-icon">${item.icon}</div>
                        <div class="file-name">${name}</div>
                    </div>
                `;
            }).join('');
        }

        function openFile(path, type) {
            if (type === 'folder') {
                currentPath = path;
                const files = getFileAt(path);
                document.getElementById('file-grid').innerHTML = renderFiles(files, path);
                document.querySelector('.address-bar').textContent = path;
            }
        }

        function navigateBack() {
            const parts = currentPath.split('\\');
            if (parts.length > 3) {
                parts.pop();
                currentPath = parts.join('\\');
                openFile(currentPath, 'folder');
            }
        }

        function navigateUp() {
            navigateBack();
        }

        function startDrag(e, windowId) {
            draggingWindow = windowId;
            const rect = windows[windowId].element.getBoundingClientRect();
            dragOffset = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };

            const onMouseMove = (e) => {
                if (!draggingWindow) return;
                const el = windows[draggingWindow].element;
                el.style.left = (e.clientX - dragOffset.x) + 'px';
                el.style.top = (e.clientY - dragOffset.y) + 'px';
            };

            const onMouseUp = () => {
                draggingWindow = null;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function closeWindow(windowId) {
            const window = windows[windowId];
            if (window) {
                window.element.remove();
                delete windows[windowId];
            }
        }

        function minimizeWindow(windowId) {
            const window = windows[windowId];
            if (window) {
                window.minimized = !window.minimized;
                window.element.style.display = window.minimized ? 'none' : 'flex';
            }
        }

        function maximizeWindow(windowId) {
            const el = windows[windowId].element;
            if (el.style.width === '100%') {
                el.style.width = '600px';
                el.style.height = '400px';
                el.style.top = '50px';
                el.style.left = '50px';
            } else {
                el.style.width = '100vw';
                el.style.height = 'calc(100vh - 50px)';
                el.style.top = '0';
                el.style.left = '0';
            }
        }

        function saveFile() {
            const text = document.getElementById('editor-textarea').value;
            alert('File saved! (This is a simulation)\n\nContent:\n' + text.substring(0, 50) + '...');
        }

        function clearEditor() {
            document.getElementById('editor-textarea').value = '';
        }

        function handleCommand(e) {
            if (e.key === 'Enter') {
                const cmd = e.target.value;
                e.target.value = '';
                alert('Command: ' + cmd + '\n\n(This is a simulation - commands not actually executed)');
            }
        }

        function calcButton(btn) {
            const display = document.getElementById('calc-display');
            if (btn === '=') {
                try {
                    display.value = eval(display.value);
                } catch (e) {
                    display.value = 'Error';
                }
            } else if (btn === 'C') {
                display.value = '';
            } else {
                display.value += btn;
            }
        }

        function showContextMenu(e, type) {
            e.preventDefault();
            const menu = document.getElementById('context-menu');
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.style.display = 'block';

            let items = [];
            if (type === 'explorer') {
                items = [
                    { text: 'New Folder', action: 'newFolder()' },
                    { text: 'New File', action: 'newFile()' },
                    { separator: true },
                    { text: 'Refresh', action: 'refresh()' }
                ];
            } else {
                items = [
                    { text: 'Cut', action: 'cut()' },
                    { text: 'Copy', action: 'copy()' },
                    { text: 'Paste', action: 'paste()' }
                ];
            }

            menu.innerHTML = items.map(item => 
                item.separator ? '<div class="context-separator"></div>' : 
                `<div class="context-item" onclick="${item.action}">${item.text}</div>`
            ).join('');
        }

        function updateTaskbar(type) {
            // Update active state
            document.querySelectorAll('.taskbar-icon').forEach(el => el.classList.remove('active'));
            const typeMap = { 'explorer': 'explorer-taskbar', 'editor': 'editor-taskbar', 'terminal': 'terminal-taskbar' };
            if (typeMap[type]) {
                document.getElementById(typeMap[type]).classList.add('active');
            }
        }

        function newFolder() { alert('New folder created!'); }
        function newFile() { alert('New file created!'); }
        function refresh() { location.reload(); }
        function cut() { alert('Cut'); }
        function copy() { alert('Copy'); }
        function paste() { alert('Paste'); }

        // Close context menu on click
        document.addEventListener('click', () => {
            document.getElementById('context-menu').style.display = 'none';
        });

        // Click on window to bring to front
        document.addEventListener('click', (e) => {
            if (e.target.closest('.window')) {
                const windowEl = e.target.closest('.window');
                Object.values(windows).forEach(w => w.element.classList.remove('active'));
                windowEl.classList.add('active');
                windowEl.style.zIndex = 2000;
            }
        });
    </script>
</body>
</html>
