<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Simulator</title>
    <style>
        /* Base Reset */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; background: #000; }

        /* --- Taskbar Styles --- */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0 10px;
            box-sizing: border-box;
        }

        .taskbar-items {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.2s;
        }

        .icon-btn:hover { background: rgba(0, 0, 0, 0.05); }

        /* --- Start Menu Styles --- */
        .start-menu {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 450px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(30px);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 9998;
            padding: 25px;
            display: none; /* Hidden by default */
            flex-direction: column;
        }

        .start-menu.active { display: flex; }

        .pinned-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="taskbar">
        <div class="taskbar-items">
            <button class="icon-btn" id="start-btn">🪟</button>
            <button class="icon-btn">🔍</button>
            <button class="icon-btn">📁</button>
            <button class="icon-btn">🌐</button>
            <button class="icon-btn">⚙️</button>
        </div>
    </div>

    <div class="start-menu" id="start-menu">
        <h3>Pinned</h3>
        <div class="pinned-grid">
            <div class="app-item"><span>Edge</span></div>
            <div class="app-item"><span>Word</span></div>
            <div class="app-item"><span>Excel</span></div>
            <div class="app-item"><span>Settings</span></div>
            <div class="app-item"><span>Files</span></div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const startMenu = document.getElementById('start-menu');

        // Toggle Start Menu
        startBtn.addEventListener('click', () => {
            startMenu.classList.toggle('active');
        });

        // Close menu if clicking outside
        window.addEventListener('click', (e) => {
            if (!startMenu.contains(e.target) && e.target !== startBtn) {
                startMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
